<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Commercial Invoice</title>
    <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="invoice-container">

    <div class="header-bar">
        Commercial Invoice
    </div>

    <table class="layout-table top-section">
        <tr>
            <td class="col-6">
                <table class="nested-info-table">
                    <tr>
                        <td class="field-label">Invoice No:</td>
                        <td class="field-value" th:text="${invoiceNo}"></td>
                    </tr>
                    <tr>
                        <td class="field-label">Invoice Date:</td>
                        <td class="field-value" th:text="${invoiceDate}"></td>
                    </tr>
                </table>
            </td>
            <td class="col-6">
                <table class="nested-info-table">
                    <tr>
                        <td class="field-label">Waybill No:</td>
                        <td class="field-value" th:text="${waybillNo}"></td>
                    </tr>
                    <tr>
                        <td class="field-label">VAT \ TAX ID:</td>
                        <td class="field-value" th:text="${vatNumber}"></td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

    <table class="layout-table party-section">
        <tr>
            <td class="col-6">

                <table class="party-info-table">

                    <tr>
                        <td class="party-label">
                            Sender:
                        </td>

                        <td class="party-content">
                            <div th:text="${senderName}"></div>
                            <div th:text="${senderCompany}"></div>
                            <div th:text="${senderAddress}"></div>
                            <div th:text="${senderCity}"></div>
                            <div th:text="${senderCountry}"></div>
                        </td>
                    </tr>

                </table>

                <div class="contact-block">

                    <table class="nested-info-table">
                        <tr>
                            <td class="field-label">Telephone :</td>
                            <td class="field-value" th:text="${senderPhone}"></td>
                        </tr>

                        <tr>
                            <td class="field-label">Fax :</td>
                            <td class="field-value" th:text="${senderFax}"></td>
                        </tr>
                    </table>

                </div>

            </td>
            <td class="col-6">

                <table class="party-info-table">

                    <tr>
                        <td class="party-label">
                            Receiver:
                        </td>

                        <td class="party-content">
                            <div th:text="${receiverName}"></div>
                            <div th:text="${receiverCompany}"></div>
                            <div th:text="${receiverAddress}"></div>
                            <div th:text="${receiverCity}"></div>
                            <div th:text="${receiverCountry}"></div>
                        </td>
                    </tr>

                </table>

                <div class="contact-block">

                    <table class="nested-info-table">

                        <tr>
                            <td class="field-label">Telephone :</td>
                            <td class="field-value" th:text="${receiverPhone}"></td>
                        </tr>

                        <tr>
                            <td class="field-label">Fax :</td>
                            <td class="field-value" th:text="${receiverFax}"></td>
                        </tr>

                        <tr>
                            <td class="field-label">Contact Name :</td>
                            <td class="field-value" th:text="${contactName}"></td>
                        </tr>

                    </table>

                </div>

            </td>
        </tr>
    </table>

    <table class="items-table">
        <thead>
        <tr>
            <th style="width: 45%;">Description</th>
            <th style="width: 10%;">Reference</th>
            <th style="width: 10%;">HSCode</th>
            <th style="width: 5%;">Qty</th>
            <th style="width: 8%;">Unit</th>
            <th style="width: 8%;">Price</th>
            <th style="width: 8%;">Currency</th>
            <th style="width: 10%;">Origin</th>
            <th style="width: 8%;">Total</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${items}">
            <td th:text="${item.description}"></td>
            <td th:text="${item.reference}"></td>
            <td th:text="${item.hsCode}"></td>
            <td th:text="${item.qty}"></td>
            <td th:text="${item.unit}"></td>
            <td th:text="${item.price}"></td>
            <td th:text="${item.currency}"></td>
            <td th:text="${item.origin}"></td>
            <td th:text="${item.total}"></td>
        </tr>
        </tbody>
    </table>

    <div class="summary-box">
        <table class="summary-table">
            <tr>
                <td class="summary-label">Total Packages</td>
                <td class="summary-value" th:text="${totalPackages}"></td>
            </tr>
            <tr>
                <td class="summary-label">Total Value</td>
                <td class="summary-value" th:text="${totalValue}"></td>
            </tr>
            <tr>
                <td class="summary-label">Reason For Export</td>
                <td class="summary-value" th:text="${exportReason}"></td>
            </tr>
        </table>
    </div>

    <div class="footer">
        <table class="footer-table">
            <tr>
                <td class="footer-left">
                    Printed Date:
                    <span th:text="${printedDate}"></span>
                </td>

                <td class="footer-right">
                    Page 1 of 1
                </td>
            </tr>
        </table>
    </div>

</div>

</body>
</html>
